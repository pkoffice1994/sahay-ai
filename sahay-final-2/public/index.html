<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahay AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #08090d; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  .app { width: 100%; max-width: 480px; background: #0c1118; border-radius: 18px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; height: 620px; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: #111820; border-bottom: 0.5px solid rgba(255,255,255,0.07); flex-shrink: 0; }
  .av { width: 36px; height: 36px; background: rgba(111,203,168,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #6fcba8; }
  .t-name { font-size: 14px; font-weight: 500; color: #ddd9d0; }
  .t-status { font-size: 11px; color: #6fcba8; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .sdot { width: 5px; height: 5px; background: #6fcba8; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; }
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.u { flex-direction: row-reverse; }
  .mav { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .mav.ai { background: rgba(111,203,168,0.15); color: #6fcba8; }
  .mav.u  { background: rgba(255,255,255,0.06); color: rgba(221,217,208,0.5); }
  .bub { max-width: 78%; padding: 10px 14px; font-size: 13px; line-height: 1.65; font-weight: 300; }
  .bub.ai { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.07); border-radius: 12px 12px 12px 2px; color: rgba(221,217,208,0.85); }
  .bub.u  { background: rgba(111,203,168,0.12); border: 0.5px solid rgba(111,203,168,0.2); border-radius: 12px 12px 2px 12px; color: #ddd9d0; }
  .typing-dots { display: flex; gap: 4px; padding: 10px 14px; }
  .td { width: 5px; height: 5px; border-radius: 50%; background: rgba(111,203,168,0.4); animation: tb 1.2s infinite; }
  .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
  @keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 10px; flex-shrink: 0; }
  .chip { background: rgba(111,203,168,0.07); border: 0.5px solid rgba(111,203,168,0.2); color: #6fcba8; font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .chip:hover { background: rgba(111,203,168,0.14); }
  .input-row { display: flex; gap: 8px; padding: 10px 14px; background: #111820; border-top: 0.5px solid rgba(255,255,255,0.07); flex-shrink: 0; align-items: flex-end; }
  .minp { flex: 1; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 8px 14px; font-size: 13px; color: #ddd9d0; font-family: 'DM Sans', sans-serif; resize: none; outline: none; min-height: 36px; max-height: 90px; line-height: 1.5; }
  .minp::placeholder { color: rgba(221,217,208,0.25); }
  .minp:focus { border-color: rgba(111,203,168,0.3); }
  .sbtn { width: 36px; height: 36px; background: #6fcba8; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sbtn:hover { opacity: 0.82; }
  .sbtn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sbtn svg { width: 14px; height: 14px; fill: #0c1118; }
  .crisis { padding: 8px 16px; font-size: 10px; color: rgba(240,149,149,0.5); text-align: center; border-top: 0.5px solid rgba(255,255,255,0.05); flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="av">S</div>
    <div style="flex:1">
      <div class="t-name">Sahay AI</div>
      <div class="t-status"><div class="sdot"></div>Yahan hoon, sun raha hoon</div>
    </div>
  </div>
  <div class="msgs" id="msgs">
    <div class="msg">
      <div class="mav ai">S</div>
      <div class="bub ai">Namaste! Main Sahay hoon. Aaj kaise feel kar rahe ho? Koi bhi baat karo, bina judgment ke. 🌿</div>
    </div>
  </div>
  <div class="chips" id="chips">
    <div class="chip" onclick="qsend('Mujhe bahut pressure feel ho raha hai')">Pressure hai 😓</div>
    <div class="chip" onclick="qsend('Hostel mein bahut akela lagta hai')">Akela hoon</div>
    <div class="chip" onclick="qsend('Study mein mann nahi lag raha')">Motivation nahi</div>
    <div class="chip" onclick="qsend('Mujhe breathing exercise batao')">Breathing exercise</div>
  </div>
  <div class="input-row">
    <textarea class="minp" id="inp" placeholder="Kuch bhi likho…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="sbtn" id="sbtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="crisis">Emergency: iCall 9152987821 · Vandrevala 1860-2662-345</div>
</div>
<script>
  let history = [], busy = false;
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
  function qsend(t) { document.getElementById('inp').value=t; sendMsg(); }
  function addMsg(role, text) {
    const c=document.getElementById('msgs');
    const d=document.createElement('div');
    d.className='msg'+(role==='user'?' u':'');
    d.innerHTML=`<div class="mav ${role==='user'?'u':'ai'}">${role==='user'?'Tu':'S'}</div><div class="bub ${role==='user'?'u':'ai'}">${text}</div>`;
    c.appendChild(d); c.scrollTop=c.scrollHeight;
  }
  function showTyping() {
    const c=document.getElementById('msgs');
    const d=document.createElement('div');
    d.className='msg'; d.id='typing';
    d.innerHTML='<div class="mav ai">S</div><div class="bub ai typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
    c.appendChild(d); c.scrollTop=c.scrollHeight;
  }
  function removeTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }
  async function sendMsg() {
    if(busy) return;
    const inp=document.getElementById('inp');
    const text=inp.value.trim();
    if(!text) return;
    document.getElementById('chips').style.display='none';
    inp.value=''; inp.style.height='auto';
    addMsg('user', text);
    history.push({role:'user', content:text});
    busy=true; document.getElementById('sbtn').disabled=true;
    showTyping();
    try {
      const res=await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history})
      });
      const data=await res.json();
      if(data.error){ removeTyping(); addMsg('ai','❌ '+data.error); }
      else { history.push({role:'assistant',content:data.reply}); removeTyping(); addMsg('ai',data.reply); }
    } catch(e) {
      removeTyping(); addMsg('ai','Network error. Dobara try karo.');
    }
    busy=false; document.getElementById('sbtn').disabled=false;
  }
</script>
</body>
</html>
